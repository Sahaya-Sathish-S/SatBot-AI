<!DOCTYPE html>
<html>

<head>

    <title>SaatBot AI</title>

    <meta charset="UTF-8">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;
        }

        body{

            height:100vh;

            background:
            linear-gradient(
            135deg,
            #0f0c29,
            #302b63,
            #24243e);

            overflow:hidden;

        }

        .background{

            position:fixed;
            width:100%;
            height:100%;
            z-index:-1;

            background:
            radial-gradient(circle at top left,
            rgba(255,0,255,.4),
            transparent 40%),

            radial-gradient(circle at bottom right,
            rgba(0,140,255,.4),
            transparent 40%),

            radial-gradient(circle at center,
            rgba(255,215,0,.25),
            transparent 50%);
        }

        .container{

            width:95%;
            max-width:1000px;
            height:90vh;

            margin:auto;
            margin-top:30px;

            border:2px solid violet;

            backdrop-filter:blur(20px);

            background:rgba(255,255,255,.05);

            border-radius:25px;

            box-shadow:
            0 0 25px violet,
            0 0 45px blue;

            display:flex;
            flex-direction:column;
        }

        .header{

            text-align:center;
            padding:20px;

            font-size:35px;
            font-weight:bold;

            background:
            linear-gradient(
            90deg,
            gold,
            violet,
            cyan);

            -webkit-background-clip:text;
            -webkit-text-fill-color:transparent;

        }

        .chat-box{

            flex:1;
            overflow-y:auto;

            padding:20px;

        }

        .message{

            max-width:75%;
            padding:15px;
            margin:10px 0;

            border-radius:18px;
            animation:fadeIn .4s ease;
        }

        .user{

            margin-left:auto;

            background:
            linear-gradient(
            135deg,
            #ff00ff,
            #7f00ff);

            color:white;
        }

        .bot{

            background:
            linear-gradient(
            135deg,
            #00c6ff,
            #0072ff);

            color:white;
        }

        .input-area{

            display:flex;
            padding:20px;
            gap:10px;
        }

        input{

            flex:1;

            padding:15px;

            border:none;
            outline:none;

            border-radius:15px;

            background:rgba(255,255,255,.1);

            color:white;

            border:1px solid violet;

            font-size:16px;
        }

        button{

            padding:15px 25px;

            border:none;

            border-radius:15px;

            cursor:pointer;

            color:white;

            background:
            linear-gradient(
            135deg,
            violet,
            blue);

            transition:.3s;

            box-shadow:
            0 0 15px violet;
        }

        button:hover{

            transform:translateY(-3px);

            box-shadow:
            0 0 30px violet,
            0 0 50px cyan;
        }

        .typing{

            color:white;
            font-size:16px;
            padding:10px;
        }

        .dots span{

            animation:blink 1.5s infinite;
        }

        .dots span:nth-child(2){
            animation-delay:.2s;
        }

        .dots span:nth-child(3){
            animation-delay:.4s;
        }

        @keyframes blink{

            0%,80%,100%{
                opacity:0;
            }

            40%{
                opacity:1;
            }
        }

        @keyframes fadeIn{

            from{
                opacity:0;
                transform:translateY(10px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }
        }

    </style>

</head>

<body>

<div class="background"></div>

<div class="container">

    <div class="header">
        ✨ SAATBOT AI ✨
    </div>

    <div class="chat-box" id="chatBox">

        <div class="message bot">
            Hello! I'm SaatBot AI. Ask me anything.
        </div>

    </div>

    <div class="input-area">

        <input
        id="userInput"
        placeholder="Ask anything..." />

        <button onclick="sendMessage()">
            Send
        </button>

    </div>

</div>

<script>

const chatBox =
document.getElementById("chatBox");

async function sendMessage(){

    const input =
    document.getElementById("userInput");

    const message =
    input.value.trim();

    if(!message) return;

    chatBox.innerHTML +=
    `
    <div class="message user">
        ${message}
    </div>
    `;

    input.value="";

    chatBox.innerHTML +=
    `
    <div class="typing" id="typing">
        SaatBot is thinking
        <span class="dots">
            <span>.</span>
            <span>.</span>
            <span>.</span>
        </span>
    </div>
    `;

    chatBox.scrollTop =
    chatBox.scrollHeight;

    const response =
    await fetch("/chat",{

        method:"POST",

        headers:{
            "Content-Type":
            "application/json"
        },

        body:JSON.stringify({
            message:message
        })

    });

    const data =
    await response.json();

    document
    .getElementById("typing")
    .remove();

    const botDiv =
    document.createElement("div");

    botDiv.className =
    "message bot";

    chatBox.appendChild(botDiv);

    let text =
    data.response;

    let i = 0;

    const typingEffect =
    setInterval(()=>{

        botDiv.innerHTML +=
        text.charAt(i);

        i++;

        if(i >= text.length){

            clearInterval(
            typingEffect);

            speech(text);
        }

    },15);

    chatBox.scrollTop =
    chatBox.scrollHeight;
}

function speech(text){

    let msg =
    new SpeechSynthesisUtterance();

    msg.text = text;

    msg.rate = 1;

    msg.pitch = 1;

    speechSynthesis.speak(msg);
}

document
.getElementById("userInput")
.addEventListener(
"keypress",
function(e){

    if(e.key==="Enter"){
        sendMessage();
    }

});

</script>

</body>
</html>
