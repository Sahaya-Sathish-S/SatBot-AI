<!DOCTYPE html>  <html>  <head>  <title>SaatBot AI</title>  

<meta charset="UTF-8">  

<style>  

    *{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    overflow:hidden;

    background:url('/static/images/background.jpg') no-repeat center center fixed;
    background-size:cover;
}

/* Golden sparkle overlay */

body::before{
    content:"";
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;

    background:
    radial-gradient(circle at 20% 20%, rgba(255,215,0,.25), transparent 30%),
    radial-gradient(circle at 80% 70%, rgba(255,215,0,.20), transparent 35%),
    radial-gradient(circle at 50% 50%, rgba(255,255,255,.08), transparent 40%);

    animation:goldGlow 8s infinite alternate;
    pointer-events:none;
}

@keyframes goldGlow{
    from{
        opacity:.5;
    }
    to{
        opacity:1;
    }
}

.container{

    width:95%;
    max-width:1100px;
    height:92vh;

    margin:auto;
    margin-top:20px;

    background:rgba(0,0,0,.45);

    border:2px solid rgba(255,215,0,.8);

    border-radius:30px;

    backdrop-filter:blur(8px);

    box-shadow:
    0 0 25px gold,
    0 0 50px rgba(255,215,0,.8),
    inset 0 0 25px rgba(255,215,0,.2);

    display:flex;
    flex-direction:column;

    overflow:hidden;
}

.header{

    text-align:center;

    padding:22px;

    font-size:40px;
    font-weight:900;
    letter-spacing:3px;

    color:#FFD700;

    text-shadow:
    0 0 10px gold,
    0 0 20px gold,
    0 0 40px gold;

    animation:headerGlow 2s infinite alternate;
}

@keyframes headerGlow{

    from{
        text-shadow:
        0 0 10px gold,
        0 0 20px gold;
    }

    to{
        text-shadow:
        0 0 20px gold,
        0 0 40px gold,
        0 0 60px gold;
    }
}

.chat-box{

    flex:1;
    overflow-y:auto;
    padding:25px;

    scrollbar-width:thin;
    scrollbar-color:gold transparent;
}

.chat-box::-webkit-scrollbar{
    width:8px;
}

.chat-box::-webkit-scrollbar-thumb{
    background:gold;
    border-radius:20px;
}

.message{

    max-width:75%;

    padding:16px 18px;

    margin:15px 0;

    border-radius:20px;

    animation:fadeIn .5s ease;
}

.user{

    margin-left:auto;

    background:linear-gradient(
    135deg,
    #FFD700,
    #FFB700);

    color:black;
    font-weight:bold;

    box-shadow:
    0 0 15px gold,
    0 0 30px rgba(255,215,0,.7);
}

.bot{

    background:rgba(0,0,0,.65);

    border:1px solid gold;

    color:#FFD700;

    box-shadow:
    0 0 10px rgba(255,215,0,.5),
    inset 0 0 15px rgba(255,215,0,.2);
}

.input-area{

    display:flex;

    gap:12px;

    padding:20px;

    background:rgba(0,0,0,.5);
}

input{

    flex:1;

    padding:15px;

    border:none;
    outline:none;

    border-radius:15px;

    background:rgba(255,255,255,.08);

    color:#FFD700;

    font-size:16px;

    border:1px solid gold;

    box-shadow:
    0 0 10px rgba(255,215,0,.4);
}

input::placeholder{
    color:#f5d76e;
}

input:focus{

    box-shadow:
    0 0 15px gold,
    0 0 35px gold;
}

button{

    padding:15px 28px;

    border:none;

    border-radius:15px;

    cursor:pointer;

    font-weight:bold;
    font-size:16px;

    color:black;

    background:linear-gradient(
    135deg,
    #FFD700,
    #FFB700);

    transition:.3s;

    box-shadow:
    0 0 15px gold,
    0 0 25px gold;
}

button:hover{

    transform:translateY(-3px) scale(1.05);

    box-shadow:
    0 0 25px gold,
    0 0 50px gold,
    0 0 80px gold;
}

.typing{

    color:#FFD700;

    font-size:17px;

    padding:12px;

    text-shadow:
    0 0 10px gold;
}

/* Beautiful typing cursor */

.bot.typing-text::after{

    content:"|";

    color:gold;

    animation:cursorBlink .7s infinite;
}

@keyframes cursorBlink{

    50%{
        opacity:0;
    }
}

.dots span{
    animation:blink 1.4s infinite;
}

.dots span:nth-child(2){
    animation-delay:.2s;
}

.dots span:nth-child(3){
    animation-delay:.4s;
}

@keyframes blink{

    0%,80%,100%{
        opacity:0;
    }

    40%{
        opacity:1;
    }
}

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(15px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* Sparkles */

.container::before,
.container::after{

    content:"✨";

    position:absolute;

    color:gold;

    font-size:25px;

    animation:sparkle 4s infinite linear;
}

.container::before{
    left:15px;
    top:20px;
}

.container::after{
    right:20px;
    bottom:20px;
}

@keyframes sparkle{

    0%{
        transform:scale(.8) rotate(0deg);
        opacity:.4;
    }

    50%{
        transform:scale(1.3) rotate(180deg);
        opacity:1;
    }

    100%{
        transform:scale(.8) rotate(360deg);
        opacity:.4;
    }
}

</style>

</head>  <body>  <div class="background"></div>  <div class="container">  <div class="header">  
    ✨ SAATBOT AI ✨  
</div>  

<div class="chat-box" id="chatBox">  

    <div class="message bot">  
        Hello! I'm SaatBot AI. Ask me anything.  
    </div>  

</div>  

<div class="input-area">  

    <input  
    id="userInput"  
    placeholder="Ask anything..." />  

    <button onclick="sendMessage()">  
        Send  
    </button>  

</div>

</div>  <script>  
  
const chatBox =  
document.getElementById("chatBox");  
  
async function sendMessage(){  
  
    const input =  
    document.getElementById("userInput");  
  
    const message =  
    input.value.trim();  
  
    if(!message) return;  
  
    chatBox.innerHTML +=  
    `  
    <div class="message user">  
        ${message}  
    </div>  
    `;  
  
    input.value="";  
  
    chatBox.innerHTML +=  
    `  
    <div class="typing" id="typing">  
        SaatBot is thinking  
        <span class="dots">  
            <span>.</span>  
            <span>.</span>  
            <span>.</span>  
        </span>  
    </div>  
    `;  
  
    chatBox.scrollTop =  
    chatBox.scrollHeight;  
  
    const response =  
    await fetch("/chat",{  
  
        method:"POST",  
  
        headers:{  
            "Content-Type":  
            "application/json"  
        },  
  
        body:JSON.stringify({  
            message:message  
        })  
  
    });  
  
    const data =  
    await response.json();  
  
    document  
    .getElementById("typing")  
    .remove();  
  
    const botDiv =  
    document.createElement("div");  
  
    botDiv.className =  
    "message bot";  
  
    chatBox.appendChild(botDiv);  
  
    let text =  
    data.response;  
  
    let i = 0;  
  
    const typingEffect =  
    setInterval(()=>{  
  
        botDiv.innerHTML +=  
        text.charAt(i);  
  
        i++;  
  
        if(i >= text.length){  
  
            clearInterval(  
            typingEffect);  
  
            speech(text);  
        }  
  
    },15);  
  
    chatBox.scrollTop =  
    chatBox.scrollHeight;  
}  
  
function speech(text){  
  
    let msg =  
    new SpeechSynthesisUtterance();  
  
    msg.text = text;  
  
    msg.rate = 1;  
  
    msg.pitch = 1;  
  
    speechSynthesis.speak(msg);  
}  
  
document  
.getElementById("userInput")  
.addEventListener(  
"keypress",  
function(e){  
  
    if(e.key==="Enter"){  
        sendMessage();  
    }  
  
});  
  
</script>  </body>  
</html>
