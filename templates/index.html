<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SaatBot AI</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', sans-serif;
    }

    body {
      height: 100vh;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      overflow: hidden;
    }

    .background {
      position: fixed;
      width: 100%;
      height: 100%;
      z-index: -1;
      background:
        radial-gradient(circle at top left, rgba(255,0,255,.4), transparent 40%),
        radial-gradient(circle at bottom right, rgba(0,140,255,.4), transparent 40%),
        radial-gradient(circle at center, rgba(255,215,0,.25), transparent 50%);
    }

    .container {
      width: 95%;
      max-width: 1000px;
      height: 90vh;
      margin: auto;
      margin-top: 30px;
      border: 2px solid violet;
      backdrop-filter: blur(20px);
      background: rgba(255,255,255,.05);
      border-radius: 25px;
      box-shadow: 0 0 25px violet, 0 0 45px blue;
      display: flex;
      flex-direction: column;
    }

    .header {
      text-align: center;
      padding: 20px;
      font-size: 35px;
      font-weight: bold;
      background: linear-gradient(90deg, gold, violet, cyan);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .chat-box {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      scroll-behavior: smooth;
    }

    .chat-box::-webkit-scrollbar {
      width: 6px;
    }

    .chat-box::-webkit-scrollbar-track {
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
    }

    .chat-box::-webkit-scrollbar-thumb {
      background: rgba(138,43,226,0.5);
      border-radius: 10px;
    }

    .message {
      max-width: 75%;
      padding: 15px;
      margin: 10px 0;
      border-radius: 18px;
      animation: fadeIn .4s ease;
      line-height: 1.6;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .user {
      margin-left: auto;
      background: linear-gradient(135deg, #ff00ff, #7f00ff);
      color: white;
    }

    .bot {
      background: linear-gradient(135deg, #00c6ff, #0072ff);
      color: white;
    }

    .input-area {
      display: flex;
      padding: 20px;
      gap: 10px;
      align-items: center;
    }

    input {
      flex: 1;
      padding: 15px;
      border: none;
      outline: none;
      border-radius: 15px;
      background: rgba(255,255,255,.1);
      color: white;
      border: 1px solid violet;
      font-size: 16px;
    }

    input::placeholder {
      color: rgba(255,255,255,0.4);
    }

    button {
      padding: 15px 25px;
      border: none;
      border-radius: 15px;
      cursor: pointer;
      color: white;
      background: linear-gradient(135deg, violet, blue);
      transition: .3s;
      box-shadow: 0 0 15px violet;
      font-size: 16px;
      white-space: nowrap;
    }

    button:hover:not(:disabled) {
      transform: translateY(-3px);
      box-shadow: 0 0 30px violet, 0 0 50px cyan;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .typing {
      color: rgba(255,255,255,0.7);
      font-size: 15px;
      padding: 10px;
      font-style: italic;
    }

    .dots span {
      animation: blink 1.5s infinite;
    }

    .dots span:nth-child(2) { animation-delay: .2s; }
    .dots span:nth-child(3) { animation-delay: .4s; }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0; }
      40% { opacity: 1; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .error {
      background: linear-gradient(135deg, #ff4444, #cc0000) !important;
    }
  </style>
</head>
<body>
  <div class="background"></div>
  <div class="container">
    <div class="header">✨ SAATBOT AI ✨</div>

    <div class="chat-box" id="chatBox">
      <div class="message bot">
        Hello! I'm SaatBot AI. Ask me anything.
      </div>
    </div>

    <div class="input-area">
      <input id="userInput" placeholder="Ask anything..." />
      <button id="sendBtn" onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    const chatBox = document.getElementById("chatBox");
    const sendBtn = document.getElementById("sendBtn");
    const conversationHistory = [];

    async function sendMessage() {
      const input = document.getElementById("userInput");
      const message = input.value.trim();
      if (!message) return;

      // Append user message
      appendMessage(message, "user");
      input.value = "";
      sendBtn.disabled = true;

      // Show typing indicator
      const typingEl = document.createElement("div");
      typingEl.className = "typing";
      typingEl.id = "typing";
      typingEl.innerHTML = `SaatBot is thinking <span class="dots"><span>.</span><span>.</span><span>.</span></span>`;
      chatBox.appendChild(typingEl);
      scrollToBottom();

      // Add to history
      conversationHistory.push({ role: "user", content: message });

      try {
        const response = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "anthropic-version": "2023-06-01",
            "anthropic-dangerous-direct-browser-access": "true"
          },
          body: JSON.stringify({
            model: "claude-sonnet-4-6",
            max_tokens: 1000,
            system: "You are SaatBot AI, a helpful, friendly, and knowledgeable assistant. Be concise but thorough in your responses.",
            messages: conversationHistory
          })
        });

        const data = await response.json();

        // Remove typing indicator
        const typingNode = document.getElementById("typing");
        if (typingNode) typingNode.remove();

        if (data.error) {
          appendMessage("Sorry, I encountered an error: " + data.error.message, "bot error");
          conversationHistory.pop(); // remove failed user message
        } else {
          const replyText = data.content
            .filter(b => b.type === "text")
            .map(b => b.text)
            .join("");

          // Add to history
          conversationHistory.push({ role: "assistant", content: replyText });

          // Typewriter effect
          await typewriterMessage(replyText);
          speech(replyText);
        }
      } catch (err) {
        const typingNode = document.getElementById("typing");
        if (typingNode) typingNode.remove();
        appendMessage("Connection error. Please try again.", "bot error");
        conversationHistory.pop();
      }

      sendBtn.disabled = false;
      scrollToBottom();
    }

    function appendMessage(text, role) {
      const div = document.createElement("div");
      div.className = "message " + role;
      div.textContent = text;
      chatBox.appendChild(div);
      scrollToBottom();
      return div;
    }

    function typewriterMessage(text) {
      return new Promise(resolve => {
        const div = document.createElement("div");
        div.className = "message bot";
        chatBox.appendChild(div);

        let i = 0;
        const interval = setInterval(() => {
          div.textContent += text.charAt(i);
          i++;
          if (i % 10 === 0) scrollToBottom();
          if (i >= text.length) {
            clearInterval(interval);
            scrollToBottom();
            resolve();
          }
        }, 15);
      });
    }

    function scrollToBottom() {
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function speech(text) {
      if (!window.speechSynthesis) return;
      // Limit speech to first 200 chars to avoid very long utterances
      const shortText = text.length > 200 ? text.slice(0, 200) + "..." : text;
      const msg = new SpeechSynthesisUtterance(shortText);
      msg.rate = 1;
      msg.pitch = 1;
      speechSynthesis.speak(msg);
    }

    document.getElementById("userInput").addEventListener("keypress", function(e) {
      if (e.key === "Enter" && !sendBtn.disabled) sendMessage();
    });
  </script>
</body>
</html>
